spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: simple
  mail:
    host: smtp.mailtrap.io
    port: 587
    username: test
    password: test
jwt:
  secret: test-secret-key-for-testing-only-min-32-chars
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000
gold-price:
  api-url: https://api.metals.live/v1/spot
  refresh-cron: "0 0 * * * *"
business:
  name: "Test Store"
rate-limit:
  login-attempts: 5
  lockout-duration-min: 30
  otp-expiry-min: 10
file:
  upload-dir: /tmp/test-uploads/
server:
  port: 8080
  servlet:
    context-path: /api/v1
logging:
  level:
    com.rajlaxmi: WARN
