spring:
  flyway:
    enabled: false

  datasource:
    url: jdbc:h2:mem:rajlaxmi_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

  cache:
    type: simple

  mail:
    host: localhost
    port: 2525
    username: test@example.com
    password: ""

jwt:
  secret: test-secret-key-for-testing-only-min-32-chars
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000

gold-price:
  api-url: https://api.metals.live/v1/spot
  refresh-cron: "0 0 * * * *"
  scheduler-enabled: false
  currency: INR
  cache-key: "gold_rates_current"

business:
  name: "Raj Laxmi Jewellers"
  legal-name: "Bhagwan Das & Sons"
  tagline: "Shashwat Sundarta, Bharose Ki Virasat"
  address: "Near Santoshi Mata Mandir, Wazirganj, Gaya, Bihar - 805131"
  phone-1: "9102316789"
  phone-2: "9693436005"
  whatsapp-1: "9102316789"
  whatsapp-2: "9693436005"
  email: "dummyshop@gmail.com"
  instagram: "https://www.instagram.com/rajlaxmi_jewellerss"
  upi-id: "329171694663381@cnrb"

rate-limit:
  login-attempts: 5
  lockout-duration-min: 30
  otp-expiry-min: 10

auth:
  expose-otp-in-response: ${AUTH_EXPOSE_OTP:false}

app:
  mail:
    enabled: false
  redis:
    enabled: false
  dev-admin:
    email: admin@rajlaxmi.local
    password: Admin@12345

file:
  upload-dir: uploads/
  allowed-types: image/jpeg,image/png,image/webp
  max-size-bytes: 5242880

server:
  port: 8080
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

logging:
  level:
    com.rajlaxmi: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
