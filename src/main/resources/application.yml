# ================================================================
# RajLaxmi Jewellers — Main Application Configuration
# Profile: dev (default)
# All secrets come from environment variables — never hardcoded
# ================================================================

spring:
  application:
    name: rajlaxmi-jewellers

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── PostgreSQL Database ──────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rajlaxmi_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:change_me_local_only}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: RajLaxmiHikariPool

  # ── JPA / Hibernate ──────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false           # set true only during debugging
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata
    open-in-view: false       # prevents lazy-loading issues in controllers

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis Cache ───────────────────────────────────────────────
  # Used for: gold prices (refresh every 1 hr), session rate-limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
      repositories:
        enabled: false

  cache:
    type: ${CACHE_TYPE:simple}
    redis:
      time-to-live: 3600000   # 1 hour in ms (matches gold price refresh)

  # ── Email (OTP, Order Confirmation, Password Reset) ──────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:rajlaxmijewellers.gaya@gmail.com}
    password: ${MAIL_PASSWORD:your_app_password_here}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ── Multipart (product image upload) ─────────────────────────
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

# ── Server ────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

# ── JWT Configuration ─────────────────────────────────────────
# Access token: short-lived (15 min) — sent with every API request
# Refresh token: long-lived (7 days) — stored in DB, used to get new access token
jwt:
  secret: ${JWT_SECRET:change_me_local_only_min_32_chars}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}      # 15 minutes
  refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}  # 7 days

# ── Gold Price API (gold-api.com — free, no API key needed) ───
# Endpoint returns live gold/silver prices in multiple currencies
gold-price:
  api-url: ${GOLD_PRICE_API_URL:https://api.gold-api.com}
  currency: INR
  scheduler-enabled: ${GOLD_PRICE_SCHEDULER_ENABLED:false}
  refresh-cron: "0 0 * * * *"   # every hour at :00 minutes
  cache-key: "gold_rates_current"

# ── Business Configuration ─────────────────────────────────────
business:
  name: "राज लक्ष्मी ज्वेलर्स"
  legal-name: "भगवान दास एंड संस"
  tagline: "शाश्वत सुंदरता, भरोसे की विरासत"
  address: "Near Santoshi Mata Mandir, Wazirganj, Gaya, Bihar - 805131"
  phone-1: "9102316789"
  phone-2: "9693436005"
  whatsapp-1: "9102316789"
  whatsapp-2: "9693436005"
  email: "rajlaxmijewellers.gaya@gmail.com"
  instagram: "https://www.instagram.com/rajlaxmi_jewellerss"
  upi-id: "nitinseth753@okhdfcbank"
  serviceable-states:
    - "Bihar"
    - "Jharkhand"

# ── Rate Limiting ─────────────────────────────────────────────
rate-limit:
  login-attempts: 5           # max failed attempts before lock
  lockout-duration-min: 30    # minutes to stay locked
  otp-expiry-min: 10          # OTP valid for 10 minutes

auth:
  expose-otp-in-response: ${AUTH_EXPOSE_OTP:false}

app:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:${MAIL_USERNAME:rajlaxmijewellers.gaya@gmail.com}}
    resend:
      api-key: ${RESEND_API_KEY:}
      api-url: ${RESEND_API_URL:https://api.resend.com/emails}
  redis:
    enabled: ${REDIS_ENABLED:false}
  dev-admin:
    enabled: ${DEV_ADMIN_ENABLED:false}
    email: ${DEV_ADMIN_EMAIL:}
    password: ${DEV_ADMIN_PASSWORD:}

# ── File Upload ───────────────────────────────────────────────
file:
  upload-dir: ${FILE_UPLOAD_DIR:${RAILWAY_VOLUME_MOUNT_PATH:uploads/}}
  allowed-types: image/jpeg,image/png,image/webp
  max-size-bytes: 5242880     # 5MB

# ── Swagger / OpenAPI ─────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  info:
    title: "RajLaxmi Jewellers API"
    description: "REST API for राज लक्ष्मी ज्वेलर्स e-commerce platform"
    version: "1.0.0"
    contact:
      name: "RajLaxmi Support"
      email: "rajlaxmijewellers.gaya@gmail.com"

# ── Actuator (health checks for Railway/Render) ───────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator

  endpoint:
    health:
      show-details: always

  health:
    mail:
      enabled: false

  info:
    env:
      enabled: true

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    com.rajlaxmi: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

