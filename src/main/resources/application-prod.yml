# ================================================================
# RajLaxmi Jewellers — PRODUCTION Configuration
# Active when: SPRING_PROFILES_ACTIVE=prod
# All values MUST come from environment variables on Railway/Render
# Never commit real secrets to git
# ================================================================

spring:
  jpa:
    hibernate:
      ddl-auto: validate      # NEVER use 'update' in production
    show-sql: false

  data:
    redis:
      ssl:
        enabled: ${REDIS_SSL:false}

server:
  error:
    include-message: never   # hide internal errors from API consumers
    include-binding-errors: never
    include-stacktrace: never

auth:
  expose-otp-in-response: ${AUTH_EXPOSE_OTP:false}

app:
  mail:
    enabled: ${MAIL_ENABLED:true}

gold-price:
  scheduler-enabled: ${GOLD_PRICE_SCHEDULER_ENABLED:true}

logging:
  level:
    com.rajlaxmi: INFO
    org.springframework.security: WARN
    root: WARN

# Disable swagger in production (optional — comment out to keep it)
# springdoc:
#   api-docs:
#     enabled: false
#   swagger-ui:
#     enabled: false
